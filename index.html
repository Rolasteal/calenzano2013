function loadExImg(input){const f=input.files[0];if(!f)return;if(f.size>2*1024*1024){if(!confirm("Il file e grande ("+(f.size/1024/1024).toFixed(1)+"MB). Continuare? Potrebbe rallentare l'app."))return}const r=new FileReader();r.onload=ev=>{document.getElementById('exImgData').value=ev.target.result;document.getElementById('exImgPreview').innerHTML=`<img src="${ev.target.result}" style="max-width:100%;max-height:300px;border-radius:8px;border:1px solid var(--border)">`};r.readAsDataURL(f)}

function sEx(id){const f=document.getElementById('fex'),o={};Array.from(f.elements).forEach(el=>{if(el.name)o[el.name]=el.value});o.img=document.getElementById('exImgData').value;if(id){Object.assign(DATA.esercizi.find(x=>x.id===id),o)}else{o.id=uid();o.dataCreazione=todayISO();DATA.esercizi.push(o)}try{saveData();closeModal();render_esercizi();toast('Salvato')}catch(e){toast('Spazio pieno - immagine troppo grande',true)}}

function openExView(id){const e=DATA.esercizi.find(x=>x.id===id);if(!e)return;const body=`${e.img?`<img src="${e.img}" style="width:100%;max-height:500px;object-fit:contain;border-radius:8px;background:#000;margin-bottom:14px">`:''}
<div style="margin-bottom:10px"><h2 style="color:var(--b1);margin-bottom:6px">${esc(e.titolo||'')}</h2><div style="font-size:12px;color:var(--muted)">${e.categoria?`<span class="badge badge-info">${esc(e.categoria)}</span>`:''} ${e.durata?'- '+esc(e.durata):''} ${e.giocatori?'- '+esc(e.giocatori)+' giocatori':''}</div></div>
${e.obiettivo?`<div style="background:var(--b4);padding:10px;border-radius:6px;margin-bottom:10px"><strong>Obiettivo:</strong> ${esc(e.obiettivo)}</div>`:''}
${e.descrizione?`<div style="margin-bottom:10px"><strong>Svolgimento:</strong><br>${esc(e.descrizione).replace(/\n/g,'<br>')}</div>`:''}
${e.materiale?`<p><strong>Materiale:</strong> ${esc(e.materiale)}</p>`:''}
${e.tags?`<p><strong>Note:</strong> ${esc(e.tags)}</p>`:''}`;
openModal(e.titolo||'Esercizio',body,`<button class="btn btn-secondary" onclick="closeModal()">Chiudi</button><button class="btn btn-primary" onclick="openExModal('${e.id}')">Modifica</button><button class="btn btn-red" onclick="window.print()">Stampa</button>`,{large:true})}

// ============ IMPOSTAZIONI ============
function render_impostazioni(){const s=DATA.squadra;document.getElementById('view-impostazioni').innerHTML=`<div class="card"><div class="card-header"><div class="card-title">Dati Squadra</div><button class="btn btn-secondary btn-sm" onclick="resetForm('fim')">Reset Form</button></div>
<form id="fim" onsubmit="event.preventDefault();sImp()">
<div class="form-row-3"><div class="form-group"><label class="form-label">Nome</label><input class="form-input" name="nome" value="${esc(s.nome)}"></div><div class="form-group"><label class="form-label">Categoria</label><input class="form-input" name="categoria" value="${esc(s.categoria)}"></div><div class="form-group"><label class="form-label">Annata</label><input class="form-input" name="annata" value="${esc(s.annata)}"></div></div>
<div class="form-row-3"><div class="form-group"><label class="form-label">Stagione</label><input class="form-input" name="stagione" value="${esc(s.stagione)}"></div><div class="form-group"><label class="form-label">Colori</label><input class="form-input" name="colori" value="${esc(s.colori)}"></div><div class="form-group"><label class="form-label">Inizio Ritiro</label><input type="date" class="form-input" name="inizioRitiro" value="${esc(s.inizioRitiro)}"></div></div>
<div class="form-row"><div class="form-group"><label class="form-label">Campo</label><input class="form-input" name="campo" value="${esc(s.campo)}"></div><div class="form-group"><label class="form-label">Indirizzo</label><input class="form-input" name="indirizzo" value="${esc(s.indirizzo)}"></div></div>
<h4 style="color:var(--b1);margin:14px 0 8px">Staff</h4>
<div class="form-row"><div class="form-group"><label class="form-label">Allenatore</label><input class="form-input" name="allenatore" value="${esc(s.allenatore)}"></div><div class="form-group"><label class="form-label">Vice</label><input class="form-input" name="vice" value="${esc(s.vice||'')}"></div></div>
<div class="form-row"><div class="form-group"><label class="form-label">Prep. Portieri</label><input class="form-input" name="preparatorePortieri" value="${esc(s.preparatorePortieri||'')}"></div><div class="form-group"><label class="form-label">Dirigente Accomp.</label><input class="form-input" name="dirigenteAccompagnatore" value="${esc(s.dirigenteAccompagnatore||'')}"></div></div>
<div class="form-group"><label class="form-label">Medico Sociale</label><input class="form-input" name="medicoSociale" value="${esc(s.medicoSociale||'')}"></div>
<h4 style="color:var(--b1);margin:14px 0 8px">Logo Squadra</h4>
<div class="form-group"><label class="form-label">Carica logo (JPG/PNG)</label><div style="display:flex;gap:10px;align-items:center"><div style="width:80px;height:80px;border:1px solid var(--border);border-radius:8px;background:#fff;display:flex;align-items:center;justify-content:center;overflow:hidden">${s.logoCustom?`<img src="${s.logoCustom}" style="width:100%;height:100%;object-fit:contain">`:'<div style="width:100%;height:100%">'+LOGO_SVG_DEFAULT+'</div>'}</div><div><input type="file" accept="image/*" onchange="uploadLogo(this)">${s.logoCustom?'<br><button class="btn btn-danger btn-sm" style="margin-top:6px" onclick="if(confirm(\'Rimuovere logo personalizzato?\')){DATA.squadra.logoCustom=\'\';saveData();render_impostazioni();applyLogoToSidebar();toast(\'Logo rimosso\')}">Rimuovi logo</button>':''}</div></div><p style="font-size:11px;color:var(--muted);margin-top:6px">Il logo apparira nella sidebar, nelle convocazioni stampate e in tutti i fogli PDF.</p></div>
<h4 id="cloud-section" style="color:var(--b1);margin:14px 0 8px">Cloud Sync (PC ↔ Telefono)</h4>
<div class="alert alert-info" style="font-size:12px;margin-bottom:10px">Permette di sincronizzare i dati tra PC e telefono usando JSONbin.io (gratis). Crea account su jsonbin.io, copia X-Master-Key e crea un bin con {} dentro, copia il Bin ID.</div>
<div class="form-row"><div class="form-group"><label class="form-label">JSONbin X-Master-Key</label><input class="form-input" name="jsonbinApiKey" value="${esc(s.jsonbinApiKey||'')}" placeholder="$2a$10$..."></div><div class="form-group"><label class="form-label">Bin ID</label><input class="form-input" name="jsonbinBinId" value="${esc(s.jsonbinBinId||'')}" placeholder="65f..."></div></div>
<p style="font-size:11px;color:var(--muted);margin-bottom:14px">Importante: stessi valori su entrambi i dispositivi (PC e telefono). Dopo aver salvato qui, usa il bottone "Aggiorna" in alto a destra per sincronizzare.</p>
<h4 style="color:var(--b1);margin:14px 0 8px">WhatsApp</h4>
<div class="form-group"><label class="form-label">Link gruppo WhatsApp (https://chat.whatsapp.com/...)</label><input class="form-input" name="whatsappGruppo" value="${esc(s.whatsappGruppo||'')}" placeholder="Lascia vuoto per scegliere ogni volta"></div>
<p style="font-size:11px;color:var(--muted)">Per ottenere il link: WhatsApp Web -> Apri gruppo -> Tocca il nome -> Invita tramite link</p>
<button type="submit" class="btn btn-primary">Salva Impostazioni</button></form></div>
<div class="card" style="margin-top:16px"><div class="card-header"><div class="card-title" style="color:var(--r2)">Reset Dati</div></div>
<button class="btn btn-danger" onclick="if(confirm('Sei sicuro? Tutti i dati verranno cancellati. OPERAZIONE IRREVERSIBILE.')){localStorage.removeItem(STORAGE_KEY);localStorage.removeItem(REMINDER_DISMISS_KEY);DATA=defaultData();saveData();render_impostazioni();toast('Dati resettati');showView('dashboard')}">Reset TUTTO</button>
<button class="btn btn-secondary" onclick="if(confirm('Azzerare solo eventi/presenze/statistiche?')){DATA.eventi=[];DATA.presenze={};DATA.valutazioni=[];DATA.scadenze=[];DATA.comunicazioni=[];saveData();toast('Eventi azzerati');showView('dashboard')}">Reset solo eventi</button>
<button class="btn btn-secondary" onclick="if(confirm('Azzerare solo gli esercizi?')){DATA.esercizi=[];saveData();toast('Esercizi azzerati')}">Reset esercizi</button>
</div>`}
function sImp(){const f=document.getElementById('fim');Array.from(f.elements).forEach(el=>{if(el.name)DATA.squadra[el.name]=el.value});saveData();document.getElementById('sidebar-sub').textContent=DATA.squadra.categoria+' - '+DATA.squadra.stagione.split('/').map((x,i)=>i?x.slice(-2):x).join('/');toast('Salvato')}
function uploadLogo(input){const f=input.files[0];if(!f)return;if(f.size>1.5*1024*1024){toast('Logo troppo grande (max 1.5MB)',true);return}const r=new FileReader();r.onload=ev=>{DATA.squadra.logoCustom=ev.target.result;try{saveData();applyLogoToSidebar();render_impostazioni();toast('Logo caricato!')}catch(e){toast('Errore: spazio pieno',true)}};r.readAsDataURL(f)}
function applyLogoToSidebar(){const w=document.getElementById('sidebar-logo-wrap');if(w)w.innerHTML=DATA.squadra.logoCustom?`<img src="${DATA.squadra.logoCustom}">`:LOGO_SVG_DEFAULT}

// ============ CLOUD SYNC ============
function openSyncModal(){
  const cfg=DATA.squadra.jsonbinApiKey&&DATA.squadra.jsonbinBinId;
  const lastSync=DATA.squadra.lastCloudSync?'Ultimo sync: '+new Date(DATA.squadra.lastCloudSync).toLocaleString('it-IT'):'Mai sincronizzato';
  const body=cfg?`<div style="text-align:center;margin-bottom:20px"><div style="font-size:14px;color:var(--muted);margin-bottom:6px">${esc(lastSync)}</div><div style="display:inline-block;padding:4px 10px;background:#dcfce7;color:#166534;border-radius:14px;font-size:11px;font-weight:600">CLOUD CONNESSO</div></div>
<div style="background:var(--b4);padding:14px;border-radius:8px;margin-bottom:14px"><strong>Cosa vuoi fare?</strong><br><span style="font-size:12px">Premi "Carica" per mandare i dati LOCALI sul cloud (sovrascrivi cloud). Premi "Scarica" per prendere i dati dal cloud (sovrascrivi locali).</span></div>
<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px">
<button class="btn btn-primary" style="padding:18px;font-size:14px;flex-direction:column;height:100px" onclick="syncUpload()"><div style="font-size:22px">&uarr;</div><div>Carica dati<br>SUL cloud</div></button>
<button class="btn btn-red" style="padding:18px;font-size:14px;flex-direction:column;height:100px" onclick="syncDownload()"><div style="font-size:22px">&darr;</div><div>Scarica dati<br>DAL cloud</div></button>
</div>
<div style="text-align:center;font-size:11px;color:var(--muted)">Tip: dal dispositivo dove hai aggiunto/modificato dati, fai "Carica". Dall'altro dispositivo fai "Scarica".</div>
<hr style="margin:18px 0">
<details><summary style="cursor:pointer;color:var(--muted);font-size:12px">Cambia impostazioni Cloud</summary><div style="margin-top:10px"><button class="btn btn-secondary btn-sm" onclick="closeModal();showView('impostazioni');setTimeout(()=>document.getElementById('cloud-section')?.scrollIntoView(),100)">Vai a Impostazioni Cloud</button></div></details>`
:`<div class="alert alert-warn">Cloud Sync non configurato. Per sincronizzare PC e telefono devi prima fare una configurazione una sola volta (5 minuti, gratis).</div>
<h4 style="color:var(--b1);margin:14px 0 10px">Setup (una volta sola):</h4>
<ol style="font-size:13px;padding-left:20px;line-height:1.8">
<li>Vai su <strong>https://jsonbin.io</strong> e clicca <strong>Sign Up</strong> (gratis, solo email)</li>
<li>Conferma email, fai login</li>
<li>Clicca <strong>API Keys</strong> nel menu, copia la <strong>X-MASTER-KEY</strong> (chiave segreta)</li>
<li>Torna in <strong>Bins</strong>, clicca <strong>Create a Bin</strong></li>
<li>Nel contenuto del bin scrivi <code>{}</code> e salva. Copia <strong>l'ID del bin</strong> (la stringa lunga nell'URL dopo /bins/)</li>
<li>Torna qui: incolla i due valori sotto e clicca Salva</li>
</ol>
<div class="form-group" style="margin-top:18px"><label class="form-label">X-Master-Key (API Key)</label><input class="form-input" id="setup-key" placeholder="$2a$10$..." value="${esc(DATA.squadra.jsonbinApiKey||'')}"></div>
<div class="form-group"><label class="form-label">Bin ID</label><input class="form-input" id="setup-bin" placeholder="65f..." value="${esc(DATA.squadra.jsonbinBinId||'')}"></div>
<button class="btn btn-primary" onclick="saveSyncSetup()">Salva configurazione</button>
<hr style="margin:20px 0">
<p style="font-size:13px;color:var(--muted)"><strong>Alternativa senza setup:</strong></p>
<button class="btn btn-secondary" onclick="App.exportBackup();closeModal()">Esporta JSON manuale</button>
<button class="btn btn-secondary" onclick="document.getElementById('manual-import').click()">Importa JSON manuale</button>
<input type="file" id="manual-import" accept=".json" style="display:none" onchange="App.importBackup(this.files[0]);closeModal()">`;
  openModal('Aggiorna / Sincronizza',body,'<button class="btn btn-secondary" onclick="closeModal()">Chiudi</button>')
}
function saveSyncSetup(){const k=document.getElementById('setup-key').value.trim();const b=document.getElementById('setup-bin').value.trim();if(!k||!b){toast('Inserisci entrambi i valori',true);return}DATA.squadra.jsonbinApiKey=k;DATA.squadra.jsonbinBinId=b;saveData();toast('Cloud configurato!');closeModal();setTimeout(openSyncModal,300)}
async function syncUpload(){if(!confirm('Sei sicuro? Vuoi caricare i dati di QUESTO dispositivo sul cloud, sovrascrivendo quelli presenti li?'))return;const k=DATA.squadra.jsonbinApiKey,b=DATA.squadra.jsonbinBinId;if(!k||!b){toast('Cloud non configurato',true);return}toast('Carico sul cloud...');try{const r=await fetch('https://api.jsonbin.io/v3/b/'+b,{method:'PUT',headers:{'Content-Type':'application/json','X-Master-Key':k,'X-Bin-Versioning':'false'},body:JSON.stringify(DATA)});if(r.ok){DATA.squadra.lastCloudSync=new Date().toISOString();saveData();closeModal();toast('Dati caricati sul cloud!')}else{const t=await r.text();toast('Errore: '+r.status+' '+t.substring(0,50),true)}}catch(e){toast('Errore di rete: '+e.message,true)}}
async function syncDownload(){if(!confirm('Sei sicuro? Vuoi sovrascrivere i dati di QUESTO dispositivo con quelli del cloud?'))return;const k=DATA.squadra.jsonbinApiKey,b=DATA.squadra.jsonbinBinId;if(!k||!b){toast('Cloud non configurato',true);return}toast('Scarico dal cloud...');try{const r=await fetch('https://api.jsonbin.io/v3/b/'+b+'/latest',{headers:{'X-Master-Key':k}});if(r.ok){const j=await r.json();const newData=j.record;if(!newData||!newData.squadra){toast('Dati cloud vuoti o non validi',true);return}newData.squadra.jsonbinApiKey=k;newData.squadra.jsonbinBinId=b;newData.squadra.lastCloudSync=new Date().toISOString();DATA=newData;if(!DATA.esercizi)DATA.esercizi=[];saveData();closeModal();toast('Dati scaricati dal cloud!');showView('dashboard');applyLogoToSidebar()}else{toast('Errore: '+r.status,true)}}catch(e){toast('Errore di rete: '+e.message,true)}}

// ============ IMPORT ============
function render_import(){document.getElementById('view-import').innerHTML=`<div class="grid grid-2">
<div class="card"><div class="card-header"><div class="card-title">Backup Completo</div></div>
<p style="color:var(--muted);margin-bottom:12px">JSON con TUTTI i dati (rosa, eventi, esercizi, valutazioni).</p>
<button class="btn btn-primary" onclick="App.exportBackup()">Scarica Backup JSON</button>
<hr style="margin:16px 0">
<p style="color:var(--muted);margin-bottom:12px">Ripristina da backup (sovrascrive tutto).</p>
<input type="file" accept=".json" onchange="App.importBackup(this.files[0])"></div>
<div class="card"><div class="card-header"><div class="card-title">Import Rosa CSV</div></div>
<p style="color:var(--muted);font-size:12px;margin-bottom:8px">Colonne: nome,cognome,dataNascita,ruolo,numero,piede,telefono,email,genitore1Nome,genitore1Telefono,genitore1Email,certScadenza,tessNumero,tessScadenza</p>
<input type="file" accept=".csv" onchange="App.importCSV(this.files[0])"><br>
<button class="btn btn-secondary btn-sm" style="margin-top:8px" onclick="App.dlTemplate()">Template CSV</button></div>
<div class="card"><div class="card-header"><div class="card-title">Export</div></div>
<button class="btn btn-primary" onclick="App.exportRosa()">Esporta Rosa</button><br><br>
<button class="btn btn-primary" onclick="App.exportStats()">Esporta Statistiche</button></div>
<div class="card"><div class="card-header"><div class="card-title">Spazio Browser</div></div>
<p id="spazio-info" style="font-size:13px">${(()=>{try{const u=new Blob([JSON.stringify(DATA)]).size;return 'Dati attuali: '+(u/1024).toFixed(1)+' KB'+(DATA.esercizi?.length?' ('+DATA.esercizi.length+' esercizi)':'')}catch(e){return ''}})()}</p>
<p style="color:var(--muted);font-size:11px;margin-top:6px">Lo storage del browser puo contenere ~5-10MB. Se carichi molte immagini di esercizi, fai backup periodici.</p></div>
</div>`}

const App={
exportBackup(){const b=new Blob([JSON.stringify(DATA,null,2)],{type:'application/json'});const u=URL.createObjectURL(b);const a=document.createElement('a');a.href=u;a.download='calenzano-backup-'+todayISO()+'.json';a.click();URL.revokeObjectURL(u);toast('Backup scaricato')},
importBackup(f){if(!f)return;const r=new FileReader();r.onload=()=>{try{const d=JSON.parse(r.result);if(!confirm('Sovrascrivere tutti i dati?'))return;DATA=d;if(!DATA.esercizi)DATA.esercizi=[];saveData();toast('Ripristinato');showView('dashboard')}catch(e){toast('File non valido',true)}};r.readAsText(f)},
dlTemplate(){const c="nome,cognome,dataNascita,ruolo,numero,piede,telefono,email,genitore1Nome,genitore1Telefono,genitore1Email,certScadenza,tessNumero,tessScadenza\nMario,Rossi,2013-05-15,MC,10,destro,,,,,,,2027-06-30";const b=new Blob([c],{type:'text/csv'});const u=URL.createObjectURL(b);const a=document.createElement('a');a.href=u;a.download='template.csv';a.click()},
importCSV(f){if(!f)return;const r=new FileReader();r.onload=()=>{try{const t=r.result;const ls=t.split(/\r?\n/).filter(l=>l.trim());if(ls.length<2){toast('CSV vuoto',true);return}const h=ls[0].split(',').map(x=>x.trim().toLowerCase());let imp=0;if(!confirm('Importare '+(ls.length-1)+' giocatori?'))return;ls.slice(1).forEach(l=>{const v=l.split(',');const o={id:uid(),stato:'attivo'};h.forEach((k,i)=>{const m={'nome':'nome','cognome':'cognome','datanascita':'dataNascita','ruolo':'ruolo','numero':'numero','piede':'piede','telefono':'telefono','email':'email','genitore1nome':'genitore1Nome','genitore1telefono':'genitore1Telefono','genitore1email':'genitore1Email','certscadenza':'certScadenza','tessnumero':'tessNumero','tessscadenza':'tessScadenza'};if(m[k])o[m[k]]=(v[i]||'').trim()});if(o.nome&&o.cognome){o.numero=parseInt(o.numero)||(DATA.giocatori.length+imp+1);DATA.giocatori.push(o);imp++}});saveData();toast('Importati '+imp);render_rosa();showView('rosa')}catch(e){toast('Errore',true)}};r.readAsText(f)},
exportRosa(){const fs=['numero','nome','cognome','dataNascita','ruolo','piede','altezza','peso','taglia','telefono','email','genitore1Nome','genitore1Telefono','genitore1Email','certScadenza','tessNumero','tessScadenza','stato'];const r=[fs.join(',')];DATA.giocatori.forEach(g=>{r.push(fs.map(x=>{const v=g[x]||'';return String(v).includes(',')?'"'+v+'"':v}).join(','))});const b=new Blob([r.join('\n')],{type:'text/csv'});const u=URL.createObjectURL(b);const a=document.createElement('a');a.href=u;a.download='rosa-'+todayISO()+'.csv';a.click()},
exportStats(){const r=['numero,giocatore,ruolo,presenze,minuti,gol,assist,gialli,rossi,tiri,tiriDx,tiriSx,tiriTesta,panchNonEntrato,pctAll,pctPart'];DATA.giocatori.forEach(g=>{const s=stats(g.id),a=attendance(g.id,isA),p=attendance(g.id,isP);r.push([g.numero||'',fn(g),g.ruolo,s.presenze,s.minuti,s.gol,s.assist,s.gialli,s.rossi,s.tiri,s.tiriDx,s.tiriSx,s.tiriTesta,s.panchinaNonEntrato,a.pct,p.pct].join(','))});const b=new Blob([r.join('\n')],{type:'text/csv'});const u=URL.createObjectURL(b);const a=document.createElement('a');a.href=u;a.download='stats-'+todayISO()+'.csv';a.click()}};

// ============ INIT ============
document.getElementById('sidebar-sub').textContent=DATA.squadra.categoria+' - '+DATA.squadra.stagione.split('/').map((x,i)=>i?x.slice(-2):x).join('/');
applyLogoToSidebar();
render_dashboard();
showView('dashboard');
setTimeout(checkReminders,800);
</script>
</body>
