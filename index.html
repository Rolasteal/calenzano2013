<script src="https://cdn.jsdelivr.net/npm/chart.js@4.5.0/dist/chart.umd.js"></script>
<style>
:root{color-scheme:light;--b1:#0d2b5c;--b2:#1e3a8a;--b3:#2563eb;--b4:#dbeafe;--r1:#991b1b;--r2:#dc2626;--r3:#ef4444;--r4:#fee2e2;--bg:#f5f7fb;--card:#fff;--text:#1f2937;--muted:#6b7280;--border:#e5e7eb;--ok:#16a34a;--warn:#f59e0b;--info:#0284c7;--shadow:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.04);--shadow-lg:0 10px 25px rgba(0,0,0,.1);--radius:10px}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;color:var(--text);background:var(--bg);font-size:14px;line-height:1.5}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;font-size:inherit}
input,select,textarea{font-family:inherit;font-size:inherit;color:inherit}
a{color:var(--b3);text-decoration:none;cursor:pointer}
#app{display:flex;min-height:100vh}
.sidebar{width:240px;background:linear-gradient(180deg,var(--b1) 0%,var(--b2) 60%,var(--r1) 100%);color:#fff;display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto;flex-shrink:0}
.sidebar-header{padding:20px 16px;border-bottom:1px solid rgba(255,255,255,.15);display:flex;align-items:center;gap:10px}
.logo-wrap{width:50px;height:50px;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.logo-wrap img{width:100%;height:100%;object-fit:contain;background:#fff;border-radius:6px;padding:2px}
.logo-wrap svg{width:100%;height:100%}
.attendance-cell.locked button{opacity:.6;cursor:not-allowed}
.attendance-cell.confirm-btn{background:var(--ok);color:#fff;font-size:9px;padding:0;cursor:pointer}
.attendance-cell.confirm-btn.locked{background:var(--warn);color:#fff}
.attendance-cell.confirm-btn button{color:#fff;font-weight:700;padding:4px 2px;font-size:9px}
.logo-svg{width:42px;height:42px;flex-shrink:0}
.sidebar-logo{font-size:16px;font-weight:700;line-height:1.1}
.sidebar-sub{font-size:11px;opacity:.85;margin-top:3px}
.nav{padding:8px 0;flex:1}
.nav-item{display:flex;align-items:center;gap:8px;padding:10px 16px;color:rgba(255,255,255,.85);font-size:13px;cursor:pointer;border-left:3px solid transparent;transition:all .15s}
.nav-item:hover{background:rgba(255,255,255,.08);color:#fff}
.nav-item.active{background:rgba(255,255,255,.14);color:#fff;border-left-color:var(--r3);font-weight:600}
.nav-section{padding:12px 16px 6px;font-size:10px;text-transform:uppercase;letter-spacing:.05em;opacity:.55;font-weight:600}
.main{flex:1;display:flex;flex-direction:column;min-width:0}
.topbar{background:#fff;border-bottom:1px solid var(--border);padding:14px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.topbar-title{font-size:18px;font-weight:700;color:var(--b1)}
.topbar-actions{display:flex;gap:8px;align-items:center}
.content{flex:1;padding:24px;overflow-x:auto}
.btn{padding:8px 14px;border-radius:var(--radius);font-size:13px;font-weight:500;display:inline-flex;align-items:center;gap:6px;transition:all .15s;border:1px solid transparent}
.btn-primary{background:var(--b2);color:#fff}
.btn-primary:hover{background:var(--b1)}
.btn-red{background:var(--r2);color:#fff}
.btn-red:hover{background:var(--r1)}
.btn-wa{background:#25d366;color:#fff}
.btn-wa:hover{background:#1ebe5b}
.btn-secondary{background:#fff;color:var(--text);border-color:var(--border)}
.btn-secondary:hover{background:var(--bg)}
.btn-danger{background:var(--r2);color:#fff}
.btn-danger:hover{background:var(--r1)}
.btn-sm{padding:5px 10px;font-size:12px}
.card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:20px;border:1px solid var(--border)}
.card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid var(--border);flex-wrap:wrap;gap:8px}
.card-title{font-size:15px;font-weight:600;color:var(--b1)}
.grid{display:grid;gap:16px}
.grid-2{grid-template-columns:repeat(auto-fit,minmax(260px,1fr))}
.grid-3{grid-template-columns:repeat(auto-fit,minmax(220px,1fr))}
.grid-4{grid-template-columns:repeat(auto-fit,minmax(180px,1fr))}
.stat{background:#fff;border-radius:var(--radius);padding:16px;border:1px solid var(--border);box-shadow:var(--shadow)}
.stat-label{font-size:11px;color:var(--muted);text-transform:uppercase;font-weight:600;margin-bottom:6px}
.stat-value{font-size:26px;font-weight:700;color:var(--b1);line-height:1}
.stat-sub{font-size:11px;color:var(--muted);margin-top:6px}
.stat.accent{background:linear-gradient(135deg,var(--b2),var(--r2));color:#fff;border:none}
.stat.accent .stat-label,.stat.accent .stat-value,.stat.accent .stat-sub{color:#fff;opacity:1}
.stat.accent .stat-label,.stat.accent .stat-sub{opacity:.9}
.view{display:none}
.view.active{display:block}
table{width:100%;border-collapse:collapse;font-size:13px}
th,td{padding:10px 12px;text-align:left;border-bottom:1px solid var(--border)}
th{background:var(--bg);font-weight:600;color:var(--muted);font-size:11px;text-transform:uppercase}
tbody tr:hover{background:var(--b4)}
tr.clickable{cursor:pointer}
.player-link{color:var(--b2);font-weight:600;cursor:pointer;text-decoration:none;border-bottom:1px dotted transparent;transition:border-color .15s}
.player-link:hover{border-bottom-color:var(--b2)}
.badge{display:inline-block;padding:2px 8px;border-radius:12px;font-size:11px;font-weight:600}
.badge-por{background:#fef3c7;color:#92400e}
.badge-dif{background:#dbeafe;color:#1e40af}
.badge-cen{background:#fee2e2;color:#991b1b}
.badge-att{background:#fce7f3;color:#9d174d}
.badge-ok{background:#dcfce7;color:#166534}
.badge-warn{background:#fef3c7;color:#92400e}
.badge-danger{background:#fee2e2;color:#991b1b}
.badge-info{background:#dbeafe;color:#1e40af}
.badge-muted{background:#f3f4f6;color:#4b5563}
.form-group{margin-bottom:14px}
.form-label{display:block;font-size:12px;font-weight:600;color:var(--muted);margin-bottom:4px;text-transform:uppercase;letter-spacing:.03em}
.form-input,.form-select,.form-textarea{width:100%;padding:8px 12px;border:1px solid var(--border);border-radius:8px;background:#fff}
.form-input:focus,.form-select:focus,.form-textarea:focus{outline:none;border-color:var(--b2);box-shadow:0 0 0 3px rgba(30,58,138,.1)}
.form-textarea{resize:vertical;min-height:60px}
.form-row{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
.form-row-3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.form-row-4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.modal-overlay{position:fixed;inset:0;background:rgba(13,43,92,.55);display:flex;align-items:center;justify-content:center;z-index:1000;padding:20px}
.modal{background:#fff;border-radius:12px;max-width:720px;width:100%;max-height:90vh;overflow-y:auto;box-shadow:var(--shadow-lg)}
.modal-lg{max-width:1000px}
.modal-header{padding:16px 24px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;background:#fff;z-index:1}
.modal-title{font-size:17px;font-weight:700;color:var(--b1)}
.modal-close{font-size:22px;color:var(--muted);padding:4px 8px}
.modal-body{padding:20px 24px}
.modal-footer{padding:14px 24px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px;position:sticky;bottom:0;background:#fff;flex-wrap:wrap}
.tabs{display:flex;gap:2px;border-bottom:1px solid var(--border);margin-bottom:20px;overflow-x:auto}
.tab{padding:10px 16px;cursor:pointer;font-size:13px;font-weight:500;color:var(--muted);border-bottom:2px solid transparent;white-space:nowrap}
.tab.active{color:var(--b1);border-bottom-color:var(--r2);font-weight:600}
.player-card{background:#fff;border-radius:var(--radius);box-shadow:var(--shadow);border:1px solid var(--border);overflow:hidden;cursor:pointer;transition:all .15s}
.player-card:hover{transform:translateY(-2px);box-shadow:var(--shadow-lg)}
.player-photo{height:140px;background:linear-gradient(135deg,var(--b2),var(--r2));display:flex;align-items:center;justify-content:center;color:#fff;font-size:42px;font-weight:700;position:relative}
.player-photo img{width:100%;height:100%;object-fit:cover}
.player-number{position:absolute;top:8px;right:8px;background:rgba(0,0,0,.45);color:#fff;width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700}
.player-info{padding:12px}
.player-name{font-weight:600;color:var(--b1);margin-bottom:4px}
.player-meta{font-size:11px;color:var(--muted);display:flex;justify-content:space-between}
.attendance-grid{display:grid;gap:1px;background:var(--border);border:1px solid var(--border);border-radius:8px;font-size:12px}
.attendance-cell{background:#fff;padding:6px 4px;text-align:center;min-width:54px}
.attendance-cell.header{background:var(--bg);font-weight:600;color:var(--muted);font-size:10px;text-transform:uppercase}
.attendance-cell.header.today{background:var(--b4);color:var(--b1)}
.attendance-cell.name{text-align:left;font-weight:500;min-width:160px;padding:6px 10px;position:sticky;left:0;z-index:2;background:#fff;border-right:2px solid var(--border)}
.attendance-cell.present{background:#dcfce7;color:#166534;font-weight:600}
.attendance-cell.absent{background:#fee2e2;color:#991b1b;font-weight:600}
.attendance-cell.injured{background:#fef3c7;color:#92400e;font-weight:600}
.attendance-cell.late{background:#dbeafe;color:#1e40af;font-weight:600}
.attendance-cell button{width:100%;padding:4px 2px;font-weight:600;border-radius:4px}
.attendance-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch}
.field-container{background:linear-gradient(180deg,#1e3a8a 0%,#0d2b5c 100%);border-radius:12px;padding:24px;position:relative;aspect-ratio:2/3;max-width:480px;margin:0 auto}
.field-bg{position:absolute;inset:24px;border:2px solid rgba(255,255,255,.6);border-radius:6px;pointer-events:none}
.field-bg::before{content:'';position:absolute;left:0;right:0;top:50%;border-top:2px solid rgba(255,255,255,.6)}
.field-bg::after{content:'';position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:80px;height:80px;border:2px solid rgba(255,255,255,.6);border-radius:50%}
.player-spot{position:absolute;transform:translate(-50%,-50%);display:flex;flex-direction:column;align-items:center;cursor:pointer;user-select:none;z-index:1}
.player-token{width:38px;height:38px;border-radius:50%;background:#fff;color:var(--b1);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;border:2px solid var(--b1);box-shadow:0 2px 6px rgba(0,0,0,.4)}
.player-token.por{background:var(--r2);color:#fff;border-color:#fff}
.player-token.empty{background:rgba(255,255,255,.85);color:var(--b2);font-size:10px}
.player-surname{margin-top:4px;background:rgba(0,0,0,.55);color:#fff;font-size:10px;font-weight:600;padding:1px 6px;border-radius:4px;max-width:80px;text-align:center;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.empty-state{text-align:center;padding:40px 20px;color:var(--muted)}
.alert{padding:12px 16px;border-radius:8px;margin-bottom:12px;font-size:13px}
.alert-info{background:var(--b4);color:var(--b1);border-left:3px solid var(--b3)}
.alert-warn{background:#fef3c7;color:#92400e;border-left:3px solid var(--warn)}
.alert-danger{background:var(--r4);color:var(--r1);border-left:3px solid var(--r2)}
.alert-ok{background:#dcfce7;color:#166534;border-left:3px solid var(--ok)}
.progress{background:var(--border);border-radius:4px;height:6px;overflow:hidden}
.progress-bar{background:linear-gradient(90deg,var(--b2),var(--r2));height:100%}
.toolbar{display:flex;gap:8px;align-items:center;margin-bottom:16px;flex-wrap:wrap}
.search-input{padding:8px 12px;border:1px solid var(--border);border-radius:8px;background:#fff;min-width:240px}
.toast{position:fixed;bottom:24px;right:24px;background:var(--b1);color:#fff;padding:12px 20px;border-radius:8px;box-shadow:var(--shadow-lg);z-index:2000;font-size:13px;animation:slideIn .3s ease-out}
@keyframes slideIn{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
.checkbox{display:inline-flex;align-items:center;gap:6px;cursor:pointer;font-size:13px}
.checkbox input{width:16px;height:16px;cursor:pointer}
.menu-toggle{display:none;font-size:22px;color:var(--b1);background:none;border:none;padding:0 12px 0 0}
@media (max-width:900px){
  .sidebar{position:fixed;left:-280px;top:0;height:100vh;z-index:200;transition:left .3s}
  .sidebar.open{left:0}
  .menu-toggle{display:block}
  .content{padding:16px}
}
.list-item{padding:12px;border-radius:8px;border:1px solid var(--border);background:#fff;margin-bottom:8px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;gap:10px}
.list-item:hover{border-color:var(--b3);background:var(--b4)}
.convoca-row{display:flex;justify-content:space-between;align-items:center;padding:6px 10px;border:1px solid var(--border);border-radius:6px;margin-bottom:4px;font-size:13px;gap:8px}
.convoca-row .name{flex:1;font-weight:500}
.convoca-row .ruolo{color:var(--muted);font-size:11px}
.timeline-ev{position:relative;padding:10px 14px 10px 60px;border-left:3px solid var(--b3);margin-left:30px;margin-bottom:6px;background:#f9fafb;border-radius:0 8px 8px 0}
.timeline-ev .minute{position:absolute;left:-30px;top:8px;width:48px;text-align:center;background:var(--b2);color:#fff;font-weight:700;font-size:12px;padding:3px 4px;border-radius:14px;border:2px solid #fff;box-shadow:0 1px 3px rgba(0,0,0,.15)}
.timeline-ev.gol{border-left-color:var(--ok)}
.timeline-ev.gol .minute{background:var(--ok)}
.timeline-ev.giallo{border-left-color:var(--warn)}
.timeline-ev.giallo .minute{background:var(--warn)}
.timeline-ev.rosso{border-left-color:var(--r2)}
.timeline-ev.rosso .minute{background:var(--r2)}
.timeline-ev.sub{border-left-color:var(--info)}
.timeline-ev.sub .minute{background:var(--info)}
.reminder-pop{position:fixed;top:24px;right:24px;background:#fff;border:2px solid var(--r2);border-left:6px solid var(--r2);border-radius:10px;padding:14px 18px;box-shadow:var(--shadow-lg);z-index:3000;max-width:380px;animation:slideIn .3s ease-out}
.reminder-pop.bday{border-color:var(--b3);border-left-color:var(--b3)}
.reminder-pop h4{color:var(--r1);margin-bottom:6px;font-size:14px}
.reminder-pop.bday h4{color:var(--b1)}
.reminder-pop p{font-size:13px;margin-bottom:8px}
.reminder-pop .actions{display:flex;gap:6px;flex-wrap:wrap}
.exercise-card{background:#fff;border:1px solid var(--border);border-radius:10px;overflow:hidden;box-shadow:var(--shadow);transition:all .15s}
.exercise-card:hover{transform:translateY(-2px);box-shadow:var(--shadow-lg)}
.exercise-img{width:100%;height:180px;background:linear-gradient(135deg,var(--b2),var(--r2));display:flex;align-items:center;justify-content:center;color:#fff;font-size:48px;cursor:pointer;overflow:hidden}
.exercise-img img{width:100%;height:100%;object-fit:cover}
.exercise-body{padding:12px}
.exercise-title{font-weight:600;color:var(--b1);margin-bottom:4px;font-size:14px}
.exercise-meta{font-size:11px;color:var(--muted);display:flex;gap:8px;flex-wrap:wrap}
@media print{
  .sidebar,.topbar,.no-print,.fab,.reminder-pop{display:none!important}

function _mdB64ToBlob(b64,type){const bin=atob(b64);const arr=new Uint8Array(bin.length);for(let i=0;i<bin.length;i++)arr[i]=bin.charCodeAt(i);return new Blob([arr],{type});}
function viewModello(){const b=_mdB64ToBlob(MODELLO_DOC.b64,'application/pdf');window.open(URL.createObjectURL(b),'_blank');}
function downloadModello(){const b=_mdB64ToBlob(MODELLO_DOC.b64,'application/pdf');const url=URL.createObjectURL(b);const a=document.createElement('a');a.href=url;a.download=MODELLO_DOC.file;document.body.appendChild(a);a.click();setTimeout(()=>{URL.revokeObjectURL(url);a.remove();},200);toast('Modello di Gioco scaricato');}

function _cgB64ToBlob(b64,type){const bin=atob(b64);const arr=new Uint8Array(bin.length);for(let i=0;i<bin.length;i++)arr[i]=bin.charCodeAt(i);return new Blob([arr],{type});}

function downloadCG(){const b=_cgB64ToBlob(CG_DOC.b64,'application/pdf');const url=URL.createObjectURL(b);const a=document.createElement('a');a.href=url;a.download=CG_DOC.file;document.body.appendChild(a);a.click();setTimeout(()=>{URL.revokeObjectURL(url);a.remove();},200);toast('Slide scaricate');}

utton>'+'</div></div>';}

function _b64ToBlob(b64, type) {
    const bin = atob(b64);
    const arr = new Uint8Array(bin.length);
    for (let i=0; i<bin.length; i++) arr[i] = bin.charCodeAt(i);
    return new Blob([arr], { type });
}
function viewScheda(num) {
    const s = SCHEDE_RUOLO[num]; if (!s) return;
    const blob = _b64ToBlob(s.b64, 'application/pdf');
    const url = URL.createObjectURL(blob);
    window.open(url, '_blank');
}
function downloadScheda(num) {
    const s = SCHEDE_RUOLO[num]; if (!s) return;
    const blob = _b64ToBlob(s.b64, 'application/pdf');
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = s.file;
    document.body.appendChild(a); a.click();
    setTimeout(() => { URL.revokeObjectURL(url); a.remove(); }, 200);
    toast('Scheda n.' + num + ' scaricata');
}
async function shareSchedaWA(num) {
    const s = SCHEDE_RUOLO[num]; if (!s) return;
    const blob = _b64ToBlob(s.b64, 'application/pdf');
    const file = new File([blob], s.file, { type: 'application/pdf' });
    if (navigator.canShare && navigator.canShare({ files: [file] })) {
        try {
            await navigator.share({
                files: [file],
                title: 'Scheda Ruolo n.' + num + ' - ' + s.label,
                text: 'Scheda Ruolo n.' + num + ' (' + s.label + ') - Calenzano Giovanissimi B 2013'
            });
            return;
        } catch(e) { /* utente annullato o errore */ }
    }
    // Fallback: scarica + apri WA web
    downloadScheda(num);
    const text = encodeURIComponent('Ti mando la tua scheda ruolo n.' + num + ': ' + s.label + ' (Calenzano Giovanissimi B 2013)');
    window.open('https://wa.me/?text=' + text, '_blank');
}
function render_schede() {
    const v = document.getElementById('view-schede');
    if (!v) return;
    const cards = Object.entries(SCHEDE_RUOLO).map(([num, s]) => {
        const kb = Math.round(s.b64.length * 0.75 / 1024);
        return '<div class="card" style="text-align:center;padding:18px 14px">'
            + '<div style="font-size:42px;font-weight:800;color:var(--b2);line-height:1;margin-bottom:6px">' + num + '</div>'
            + '<div style="font-size:13px;font-weight:600;margin-bottom:4px;min-height:34px">' + s.label + '</div>'
            + '<div style="font-size:10px;color:var(--muted);margin-bottom:12px">PDF ~' + kb + ' KB</div>'
            + '<div style="display:flex;gap:5px;justify-content:center;flex-wrap:wrap">'
            + '<button class="btn btn-primary btn-sm" onclick="viewScheda(\'' + num + '\')">Apri</button>'
            + '<button class="btn btn-secondary btn-sm" onclick="downloadScheda(\'' + num + '\')">Scarica</button>'
            + '<button class="btn btn-wa btn-sm" onclick="shareSchedaWA(\'' + num + '\')">WA</button>'
            + '</div></div>';
    }).join('');
    v.innerHTML = '<div class="card" style="margin-bottom:16px">'
        + '<div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px">'
        + '<div><div class="card-title">Schede Ruolo - 11 PDF dettagliati</div>'
        + '<div style="color:var(--muted);font-size:12px;margin-top:4px">Una scheda per ogni numero in campo (1-11), da consegnare al singolo giocatore. '
        + 'Apri per leggere, Scarica per stampare, WA per condividere.</div></div></div></div>'
        + '<div class="grid grid-3">' + cards + '</div>';
}

<div class="form-row-3"><div class="form-group"><label class="form-label">Nome*</label><input class="form-input" name="nome" value="${esc(g?.nome||'')}" required></div><div class="form-group"><label class="form-label">Cognome*</label><input class="form-input" name="cognome" value="${esc(g?.cognome||'')}" required></div><div class="form-group"><label class="form-label">N. Maglia</label><input type="number" class="form-input" name="numero" value="${g?.numero||''}"></div></div>
<div class="form-row-3"><div class="form-group"><label class="form-label">Data Nascita*</label><input type="date" class="form-input" name="dataNascita" value="${g?.dataNascita||''}" required></div><div class="form-group"><label class="form-label">Ruolo</label><select class="form-select" name="ruolo">${Object.keys(RUOLI).map(r=>`<option value="${r}" ${g?.ruolo===r?'selected':''}>${r} - ${RUOLI[r].label}</option>`).join('')}</select></div><div class="form-group"><label class="form-label">Piede</label><select class="form-select" name="piede"><option value="destro" ${g?.piede==='destro'?'selected':''}>Destro</option><option value="sinistro" ${g?.piede==='sinistro'?'selected':''}>Sinistro</option><option value="ambidestro" ${g?.piede==='ambidestro'?'selected':''}>Ambidestro</option></select></div></div>
<div class="form-row"><div class="form-group"><label class="form-label">Stato</label><select class="form-select" name="stato"><option value="attivo" ${g?.stato==='attivo'?'selected':''}>Attivo</option><option value="infortunato" ${g?.stato==='infortunato'?'selected':''}>Infortunato</option><option value="squalificato" ${g?.stato==='squalificato'?'selected':''}>Squalificato</option><option value="sospeso" ${g?.stato==='sospeso'?'selected':''}>Sospeso</option></select></div><div class="form-group"><label class="form-label">Data Ingresso</label><input type="date" class="form-input" name="dataIngresso" value="${g?.dataIngresso||todayISO()}"></div></div>
<div class="form-group"><label class="form-label">Foto (URL o vuoto)</label><input class="form-input" name="foto" value="${esc(g?.foto||'')}"></div>
</div>
<div id="tab-cont" class="tab-pane" style="display:none">
<div class="form-row"><div class="form-group"><label class="form-label">Telefono Giocatore</label><input class="form-input" name="telefono" value="${esc(g?.telefono||'')}"></div><div class="form-group"><label class="form-label">Email</label><input class="form-input" name="email" value="${esc(g?.email||'')}"></div></div>
<div class="form-group"><label class="form-label">Indirizzo</label><input class="form-input" name="indirizzo" value="${esc(g?.indirizzo||'')}"></div>
<h4 style="margin:14px 0 8px;color:var(--b1)">Genitore 1</h4>
<div class="form-row-3"><div class="form-group"><label class="form-label">Nome</label><input class="form-input" name="genitore1Nome" value="${esc(g?.genitore1Nome||'')}"></div><div class="form-group"><label class="form-label">Tel</label><input class="form-input" name="genitore1Telefono" value="${esc(g?.genitore1Telefono||'')}"></div><div class="form-group"><label class="form-label">Email</label><input class="form-input" name="genitore1Email" value="${esc(g?.genitore1Email||'')}"></div></div>
<h4 style="margin:14px 0 8px;color:var(--b1)">Genitore 2</h4>
<div class="form-row"><div class="form-group"><label class="form-label">Nome</label><input class="form-input" name="genitore2Nome" value="${esc(g?.genitore2Nome||'')}"></div><div class="form-group"><label class="form-label">Tel</label><input class="form-input" name="genitore2Telefono" value="${esc(g?.genitore2Telefono||'')}"></div></div>
${g&&(g.genitore1Telefono||g.telefono)?`<div style="margin-top:12px;padding:10px;background:#dcfce7;border-radius:8px"><strong>Invia messaggio diretto:</strong><div style="margin-top:6px;display:flex;gap:6px;flex-wrap:wrap">${g.telefono?`<button type="button" class="btn btn-wa btn-sm" onclick="waPhone('${g.telefono}','Ciao ${esc(g.nome)}')">WhatsApp Giocatore</button>`:''}${g.genitore1Telefono?`<button type="button" class="btn btn-wa btn-sm" onclick="waPhone('${g.genitore1Telefono}','Ciao ${esc(g.genitore1Nome||'')}')">WA Gen.1</button>`:''}${g.genitore2Telefono?`<button type="button" class="btn btn-wa btn-sm" onclick="waPhone('${g.genitore2Telefono}','Ciao')">WA Gen.2</button>`:''}</div></div>`:''}
</div>
<div id="tab-fisico" class="tab-pane" style="display:none">
<div class="form-row-4"><div class="form-group"><label class="form-label">Altezza cm</label><input type="number" class="form-input" name="altezza" value="${g?.altezza||''}"></div><div class="form-group"><label class="form-label">Peso kg</label><input type="number" class="form-input" name="peso" value="${g?.peso||''}"></div><div class="form-group"><label class="form-label">Taglia</label><select class="form-select" name="taglia">${['XS','S','M','L','XL','XXL'].map(t=>`<option value="${t}" ${g?.taglia===t?'selected':''}>${t}</option>`).join('')}</select></div><div class="form-group"><label class="form-label">Scarpe</label><input type="number" class="form-input" name="scarpe" value="${g?.scarpe||''}"></div></div>
</div>
<div id="tab-doc" class="tab-pane" style="display:none">
<h4 style="margin-bottom:8px;color:var(--b1)">Certificato Medico</h4>
<div class="form-row-3"><div class="form-group"><label class="form-label">Numero</label><input class="form-input" name="certNumero" value="${esc(g?.certNumero||'')}"></div><div class="form-group"><label class="form-label">Scadenza</label><input type="date" class="form-input" name="certScadenza" value="${g?.certScadenza||''}"></div><div class="form-group"><label class="form-label">Tipo</label><select class="form-select" name="certTipo"><option value="agonistico" ${g?.certTipo==='agonistico'?'selected':''}>Agonistico</option><option value="non agonistico" ${g?.certTipo==='non agonistico'?'selected':''}>Non Agonistico</option></select></div></div>
<h4 style="margin:14px 0 8px;color:var(--b1)">Tesseramento FIGC</h4>
<div class="form-row"><div class="form-group"><label class="form-label">Numero Tessera</label><input class="form-input" name="tessNumero" value="${esc(g?.tessNumero||'')}"></div><div class="form-group"><label class="form-label">Scadenza</label><input type="date" class="form-input" name="tessScadenza" value="${g?.tessScadenza||''}"></div></div>
</div>
<div id="tab-tec" class="tab-pane" style="display:none">
<div class="form-group"><label class="form-label">Pregi</label><textarea class="form-textarea" name="pregi">${esc(g?.pregi||'')}</textarea></div>
<div class="form-group"><label class="form-label">Miglioramento</label><textarea class="form-textarea" name="difetti">${esc(g?.difetti||'')}</textarea></div>
<div class="form-group"><label class="form-label">Note tecniche</label><textarea class="form-textarea" name="noteTecniche">${esc(g?.noteTecniche||'')}</textarea></div>
<div class="form-group"><label class="form-label">Note caratteriali</label><textarea class="form-textarea" name="noteCaratteriali">${esc(g?.noteCaratteriali||'')}</textarea></div>
</div>
${g?`<div id="tab-stat" class="tab-pane" style="display:none">${renderGiocatoreStats(g)}</div>`:''}
</form>`;
const footer=`${g?`<button class="btn btn-danger" onclick="if(confirm('Eliminare ${esc(fn(g))}?')){deleteGiocatore('${g.id}')}">Elimina</button><button class="btn btn-wa" onclick="shareGiocatoreWA('${g.id}')">Condividi Scheda WA</button>`:''}<button class="btn btn-secondary" onclick="resetForm('fg')">Reset</button><button class="btn btn-secondary" onclick="closeModal()">Annulla</button><button class="btn btn-primary" onclick="document.getElementById('fg').requestSubmit()">Salva</button>`;
openModal(g?fn(g):'Nuovo Giocatore',body,footer,{large:true})}
function waPhone(p,m){const u=waLinkPhone(p,m);if(u)window.open(u,'_blank')}
function renderGiocatoreStats(g){const s=stats(g.id),a=attendance(g.id,isA),pp=attendance(g.id,isP);return `<div class="grid grid-3"><div class="stat"><div class="stat-label">Gol</div><div class="stat-value">${s.gol}</div></div><div class="stat"><div class="stat-label">Assist</div><div class="stat-value">${s.assist}</div></div><div class="stat"><div class="stat-label">Presenze</div><div class="stat-value">${s.presenze}</div></div><div class="stat"><div class="stat-label">Minuti</div><div class="stat-value">${s.minuti}</div></div><div class="stat"><div class="stat-label">Cartellini</div><div class="stat-value">${s.gialli}G ${s.rossi}R</div></div><div class="stat"><div class="stat-label">Tiri</div><div class="stat-value">${s.tiri}</div><div class="stat-sub">${s.tiriDx} dx / ${s.tiriSx} sx / ${s.tiriTesta} testa</div></div><div class="stat"><div class="stat-label">Panch. non entrato</div><div class="stat-value">${s.panchinaNonEntrato}</div></div><div class="stat"><div class="stat-label">%Allen</div><div class="stat-value">${a.pct}%</div></div><div class="stat"><div class="stat-label">%Part</div><div class="stat-value">${pp.pct}%</div></div></div>`}
function saveGiocatore(id){const f=document.getElementById('fg'),o={};Array.from(f.elements).forEach(el=>{if(el.name)o[el.name]=el.value});if(id){Object.assign(fG(id),o);fG(id).numero=parseInt(o.numero)||fG(id).numero}else{o.id=uid();o.numero=parseInt(o.numero)||(DATA.giocatori.length+1);DATA.giocatori.push(o)}saveData();closeModal();render_rosa();toast('Salvato')}
function deleteGiocatore(id){DATA.giocatori=DATA.giocatori.filter(g=>g.id!==id);saveData();closeModal();render_rosa();toast('Eliminato')}

// ============ CALENDARIO ============
let _calMese=new Date();
function render_calendario(){const y=_calMese.getFullYear(),m=_calMese.getMonth();const primo=new Date(y,m,1),ultimo=new Date(y,m+1,0);const startWd=(primo.getDay()+6)%7;const giorni=ultimo.getDate();const mese=_calMese.toLocaleDateString('it-IT',{month:'long',year:'numeric'});const cells=[];for(let i=0;i<startWd;i++)cells.push({empty:true});for(let d=1;d<=giorni;d++){const iso=y+'-'+String(m+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');cells.push({d,iso,eventi:DATA.eventi.filter(e=>e.data===iso)})}while(cells.length%7)cells.push({empty:true});
document.getElementById('view-calendario').innerHTML=`<div class="toolbar no-print"><button class="btn btn-secondary btn-sm" onclick="_calMese.setMonth(_calMese.getMonth()-1);render_calendario()">&lt;</button><div style="font-size:16px;font-weight:600;color:var(--b1);min-width:180px;text-align:center">${mese.charAt(0).toUpperCase()+mese.slice(1)}</div><button class="btn btn-secondary btn-sm" onclick="_calMese.setMonth(_calMese.getMonth()+1);render_calendario()">&gt;</button><button class="btn btn-secondary btn-sm" onclick="_calMese=new Date();render_calendario()">Oggi</button><div style="flex:1"></div><button class="btn btn-primary" onclick="openEventoModal()">+ Evento</button></div>
<div class="card" style="padding:12px"><div style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px">
${['Lun','Mar','Mer','Gio','Ven','Sab','Dom'].map(d=>`<div style="text-align:center;padding:8px;font-weight:600;color:var(--muted);font-size:12px">${d}</div>`).join('')}
${cells.map(c=>{if(c.empty)return '<div></div>';const isToday=c.iso===todayISO();return `<div style="min-height:90px;border:1px solid var(--border);border-radius:6px;padding:6px;background:${isToday?'var(--b4)':'#fff'};cursor:pointer" onclick="openEventoModal(null,'${c.iso}')"><div style="font-size:12px;font-weight:${isToday?'700':'500'};color:${isToday?'var(--b1)':'var(--text)'}">${c.d}</div>${c.eventi.map(e=>{const col=e.tipo==='partita'?'var(--r2)':e.tipo==='allenamento'?'var(--b2)':e.tipo==='amichevole'?'var(--warn)':'var(--muted)';return `<div onclick="event.stopPropagation();openEventoModal('${e.id}')" style="background:${col};color:#fff;font-size:10px;padding:2px 4px;border-radius:3px;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${e.ora||''} ${evL(e)}</div>`}).join('')}</div>`}).join('')}</div></div>`}

function openEventoModal(id,preset){const e=id?fE(id):null;const isNew=!e;
const body=`<form id="fev" onsubmit="event.preventDefault();saveEvento('${id||''}')">
<div class="form-row-3"><div class="form-group"><label class="form-label">Tipo*</label><select class="form-select" name="tipo" required onchange="document.getElementById('evt-ext').style.display=(this.value==='allenamento'||this.value==='riunione')?'none':'block'"><option value="allenamento" ${e?.tipo==='allenamento'?'selected':''}>Allenamento</option><option value="partita" ${e?.tipo==='partita'?'selected':''}>Partita Campionato</option><option value="amichevole" ${e?.tipo==='amichevole'?'selected':''}>Amichevole</option><option value="torneo" ${e?.tipo==='torneo'?'selected':''}>Torneo</option><option value="riunione" ${e?.tipo==='riunione'?'selected':''}>Riunione</option></select></div><div class="form-group"><label class="form-label">Data*</label><input type="date" class="form-input" name="data" value="${e?.data||preset||todayISO()}" required></div><div class="form-group"><label class="form-label">Ora</label><input type="time" class="form-input" name="ora" value="${e?.ora||'17:30'}"></div></div>
<div class="form-row"><div class="form-group"><label class="form-label">Luogo</label><input class="form-input" name="luogo" value="${esc(e?.luogo||DATA.squadra.campo||'')}"></div><div class="form-group"><label class="form-label">Durata (min)</label><input type="number" class="form-input" name="durata" value="${e?.durata||90}"></div></div>
<div id="evt-ext" style="display:${e&&isP(e)?'block':'none'}">
<div class="form-row-3"><div class="form-group"><label class="form-label">Avversario</label><input class="form-input" name="avversario" value="${esc(e?.avversario||'')}"></div><div class="form-group"><label class="form-label">Casa/Trasf.</label><select class="form-select" name="casaTrasferta"><option value="casa" ${e?.casaTrasferta==='casa'?'selected':''}>Casa</option><option value="trasferta" ${e?.casaTrasferta==='trasferta'?'selected':''}>Trasferta</option></select></div><div class="form-group"><label class="form-label">Competizione</label><input class="form-input" name="competizione" value="${esc(e?.competizione||'Campionato')}"></div></div>
<div class="form-row"><div class="form-group"><label class="form-label">Gol Casa</label><input type="number" class="form-input" name="golCasa" value="${e?.golCasa||0}"></div><div class="form-group"><label class="form-label">Gol Trasferta</label><input type="number" class="form-input" name="golTrasferta" value="${e?.golTrasferta||0}"></div></div>
</div>
<div class="form-group"><label class="form-label">Obiettivi/Argomenti</label><textarea class="form-textarea" name="obiettivi">${esc(e?.obiettivi||'')}</textarea></div>
<div class="form-group"><label class="form-label">Note</label><textarea class="form-textarea" name="note">${esc(e?.note||'')}</textarea></div>
<div class="form-group"><label class="checkbox"><input type="checkbox" name="completato" ${e?.completato?'checked':''}> Completato</label></div>
</form>
${e?`<div style="margin-top:14px;padding-top:14px;border-top:1px solid var(--border)"><h4 style="color:var(--b1);margin-bottom:10px">Azioni rapide</h4><div style="display:flex;gap:6px;flex-wrap:wrap"><button class="btn btn-secondary btn-sm" onclick="showPresFor('${e.id}')">Presenze</button>${isP(e)?`<button class="btn btn-secondary btn-sm" onclick="openPartitaDettagli('${e.id}')">Dettagli</button><button class="btn btn-secondary btn-sm" onclick="openConvocazione('${e.id}')">Convocazione</button><button class="btn btn-wa btn-sm" onclick="shareEventoWA('${e.id}')">Condividi WA</button>`:`<button class="btn btn-wa btn-sm" onclick="shareEventoWA('${e.id}')">Condividi WA</button>`}</div></div>`:''}`;
const footer=`${e?`<button class="btn btn-danger" onclick="if(confirm('Eliminare evento?')){deleteEvento('${e.id}')}">Elimina</button>`:''}<button class="btn btn-secondary" onclick="resetForm('fev')">Reset</button><button class="btn btn-secondary" onclick="closeModal()">Annulla</button><button class="btn btn-primary" onclick="document.getElementById('fev').requestSubmit()">Salva</button>`;
openModal(e?evL(e)+' del '+fmtDate(e.data):'Nuovo Evento',body,footer)}
function saveEvento(id){const f=document.getElementById('fev'),o={};Array.from(f.elements).forEach(el=>{if(!el.name)return;if(el.type==='checkbox')o[el.name]=el.checked;else o[el.name]=el.value});o.golCasa=parseInt(o.golCasa)||0;o.golTrasferta=parseInt(o.golTrasferta)||0;o.durata=parseInt(o.durata)||90;if(id){Object.assign(fE(id),o)}else{o.id=uid();DATA.eventi.push(o)}saveData();closeModal();render_calendario();toast('Salvato')}
function deleteEvento(id){DATA.eventi=DATA.eventi.filter(e=>e.id!==id);delete DATA.presenze[id];saveData();closeModal();render_calendario();toast('Eliminato')}
function shareEventoWA(id){const e=fE(id);let t=`*${evL(e).toUpperCase()}*\n${fmtDateLong(e.data)} - Ore ${e.ora||'-'}\n${e.avversario?'vs '+e.avversario+'\n':''}Luogo: ${e.luogo||'-'}${e.competizione?'\nCompetizione: '+e.competizione:''}`;
if(isP(e)&&(e.golCasa||e.golTrasferta||(e.eventiPartita||[]).length||(e.sostituzioni||[]).length)){
  t+=`\n\n*RISULTATO: ${e.golCasa||0} - ${e.golTrasferta||0}*`;
  const tl=[];(e.eventiPartita||[]).forEach(ev=>tl.push({min:ev.minuto||0,kind:'ev',tipo:ev.tipo,gId:ev.giocatoreId}));(e.sostituzioni||[]).forEach(s=>tl.push({min:s.minuto||0,kind:'sub',gIn:s.in,gOut:s.out}));tl.sort((a,b)=>a.min-b.min);
  if(tl.length){t+='\n\n*Cronologia partita:*';const labels={gol:'GOL',assist:'Assist',giallo:'Giallo',rosso:'Rosso',autogol:'AUTOGOL',rigore:'Rigore',rigoreSbagliato:'Rigore sbagliato',tiroDx:'Tiro destro',tiroSx:'Tiro sinistro',tiroTesta:'Tiro di testa'};tl.forEach(x=>{if(x.kind==='sub'){const gI=fG(x.gIn),gO=fG(x.gOut);t+=`\n${x.min}' Sost: ${gO?fn(gO):'-'} -> ${gI?fn(gI):'-'}`}else{const g=fG(x.gId);t+=`\n${x.min}' ${labels[x.tipo]||x.tipo} - ${g?fn(g):'-'}`}})}
}
t+='\n\nMister Roberto';shareWAGruppo(t)}

// ============ PRESENZE ============
let _presFilter='allenamento';
function render_presenze(){
  // Ordinamento: dalla data piu recente a sinistra, scorrendo a destra le successive (piu vecchie)
  // L'utente vuole "data piu recente a sinistra" - quindi sort DESC (newest first)
  const eventi=DATA.eventi.filter(e=>_presFilter==='allenamento'?isA(e):isP(e)).sort((a,b)=>(b.data+(b.ora||'')).localeCompare(a.data+(a.ora||'')));
  const giocatori=DATA.giocatori.slice().sort((a,b)=>(a.numero||99)-(b.numero||99));
  const stati={P:{l:'P',c:'present'},A:{l:'A',c:'absent'},I:{l:'I',c:'injured'},R:{l:'R',c:'late'},S:{l:'S',c:'absent'}};
  const summary=giocatori.map(g=>{const a=attendance(g.id,_presFilter==='allenamento'?isA:isP);return {g,a}});
  const oggi=todayISO();
  const gridCols=`200px ${eventi.map(()=>'minmax(60px,1fr)').join(' ')} 80px`;
  document.getElementById('view-presenze').innerHTML=`
<div class="toolbar no-print"><select class="form-select" style="width:auto" onchange="_presFilter=this.value;render_presenze()"><option value="allenamento" ${_presFilter==='allenamento'?'selected':''}>Allenamenti</option><option value="partita" ${_presFilter==='partita'?'selected':''}>Partite</option></select><div style="flex:1"></div><button class="btn btn-primary" onclick="openEventoModal()">+ Nuovo</button></div>
<div class="card" style="margin-bottom:16px"><div class="card-header"><div class="card-title">Legenda</div></div><div style="display:flex;gap:14px;flex-wrap:wrap;font-size:13px"><span class="badge badge-ok">P</span> Presente <span class="badge badge-danger">A</span> Assente <span class="badge badge-warn">I</span> Infortunato <span class="badge badge-info">R</span> Ritardo <span class="badge badge-muted">S</span> Squalificato</div></div>
${eventi.length===0?'<div class="empty-state">Nessun evento. Aggiungine dal Calendario.</div>':`
<div class="card" style="padding:0"><div class="attendance-scroll"><div class="attendance-grid" style="grid-template-columns:${gridCols};min-width:max-content">
<div class="attendance-cell header name">Giocatore</div>${eventi.map(e=>`<div class="attendance-cell header ${e.data===oggi?'today':''}" title="${fmtDate(e.data)}"><div>${fmtDateShort(e.data)}</div><div style="font-size:9px">${e.ora||''}</div>${e.presenzeConfermate?'<div style="font-size:8px;color:var(--ok)">LOCK</div>':''}</div>`).join('')}<div class="attendance-cell header">%</div>
${giocatori.map(g=>`<div class="attendance-cell name"><strong>${g.numero||''}</strong> ${pLink(g)} <span class="badge ${rBadge(g.ruolo)}" style="font-size:9px;padding:1px 5px">${g.ruolo}</span></div>${eventi.map(e=>{const st=stati[(DATA.presenze[e.id]||{})[g.id]]||{l:'-',c:''};const locked=e.presenzeConfermate;return `<div class="attendance-cell ${st.c} ${locked?'locked':''}"><button ${locked?'disabled':''} onclick="cyclePres('${e.id}','${g.id}')">${st.l}</button></div>`}).join('')}<div class="attendance-cell"><strong>${attendance(g.id,_presFilter==='allenamento'?isA:isP).pct}%</strong></div>`).join('')}
<div class="attendance-cell name" style="background:var(--bg);font-weight:600;font-size:11px">Conferma</div>
${eventi.map(e=>e.presenzeConfermate?`<div class="attendance-cell confirm-btn locked"><button onclick="toggleConfermaPresenze('${e.id}')" title="Sblocca per modificare">SBLOCCA</button></div>`:`<div class="attendance-cell confirm-btn"><button onclick="toggleConfermaPresenze('${e.id}')" title="Blocca presenze">CONFERMA</button></div>`).join('')}
<div class="attendance-cell" style="background:var(--bg)"></div>
<div class="attendance-cell name" style="background:var(--bg);font-weight:600;font-size:11px">Condividi WA</div>
${eventi.map(e=>{const presCount=Object.values(DATA.presenze[e.id]||{}).filter(s=>s==='P'||s==='R').length;return `<div class="attendance-cell" style="padding:2px"><button class="btn btn-wa btn-sm" style="width:100%;padding:4px 2px;font-size:9px;line-height:1.2" onclick="shareAttendanceWA('${e.id}')" title="Condividi presenze ${fmtDate(e.data)} su WhatsApp"><strong>WA</strong><br><span style="font-size:8px">${fmtDateShort(e.data)}</span><br><span style="font-size:8px">${presCount}P</span></button></div>`}).join('')}
<div class="attendance-cell" style="background:var(--bg)"></div>
</div></div></div>`}
<div class="card" style="margin-top:16px"><div class="card-header"><div class="card-title">Riepilogo ${_presFilter==='allenamento'?'Allenamenti':'Partite'}</div></div>
<table><thead><tr><th>#</th><th>Giocatore</th><th>Ruolo</th><th>Pres</th><th>Ass</th><th>Inf</th><th>Rit</th><th>%</th></tr></thead><tbody>${summary.sort((a,b)=>b.a.pct-a.a.pct).map(s=>`<tr><td>${s.g.numero||''}</td><td>${pLink(s.g)}</td><td><span class="badge ${rBadge(s.g.ruolo)}">${s.g.ruolo}</span></td><td><strong style="color:var(--ok)">${s.a.presente}</strong></td><td style="color:var(--r2)">${s.a.totale-s.a.presente-s.a.infortunato}</td><td style="color:var(--warn)">${s.a.infortunato}</td><td>${s.a.ritardi}</td><td><div style="display:flex;align-items:center;gap:6px"><div class="progress" style="flex:1;max-width:80px"><div class="progress-bar" style="width:${s.a.pct}%"></div></div><strong>${s.a.pct}%</strong></div></td></tr>`).join('')}</tbody></table></div>`}
function cyclePres(eId,gId){const ev=fE(eId);if(ev.presenzeConfermate){toast('Presenze confermate - sblocca prima',true);return}if(!DATA.presenze[eId])DATA.presenze[eId]={};const o=['P','A','I','R','S',undefined];const c=DATA.presenze[eId][gId];const n=o[(o.indexOf(c)+1)%o.length];if(n===undefined)delete DATA.presenze[eId][gId];else DATA.presenze[eId][gId]=n;saveData();render_presenze()}
function toggleConfermaPresenze(eId){const ev=fE(eId);if(ev.presenzeConfermate){if(!confirm('Sei sicuro di voler sbloccare le presenze di questo evento?'))return;ev.presenzeConfermate=false;toast('Presenze sbloccate - ora modificabili')}else{if(!confirm('Confermare le presenze di '+evL(ev)+' del '+fmtDate(ev.data)+'? Non potrai piu modificarle se non sblocchi.'))return;ev.presenzeConfermate=true;ev.dataConferma=new Date().toISOString();toast('Presenze confermate e bloccate')}saveData();render_presenze()}
function shareTopGolWA(){const st=DATA.giocatori.map(g=>({g,s:stats(g.id)})).filter(x=>x.s.gol>0).sort((a,b)=>b.s.gol-a.s.gol);if(!st.length){toast('Nessun gol registrato',true);return}const t=`*CLASSIFICA MARCATORI - Calenzano ${DATA.squadra.categoria}*\n\n${st.map((x,i)=>`${i+1}. ${fn(x.g)} - ${x.s.gol} gol`).join('\n')}\n\nMister Roberto`;shareWAGruppo(t)}
function shareTopAssWA(){const st=DATA.giocatori.map(g=>({g,s:stats(g.id)})).filter(x=>x.s.assist>0).sort((a,b)=>b.s.assist-a.s.assist);if(!st.length){toast('Nessun assist',true);return}const t=`*CLASSIFICA ASSIST - Calenzano ${DATA.squadra.categoria}*\n\n${st.map((x,i)=>`${i+1}. ${fn(x.g)} - ${x.s.assist} ass.`).join('\n')}\n\nMister Roberto`;shareWAGruppo(t)}
function shareProssimiWA(){const now=new Date();const fu=DATA.eventi.filter(e=>new Date(e.data+'T'+(e.ora||'00:00'))>=now).sort((a,b)=>(a.data+(a.ora||'')).localeCompare(b.data+(b.ora||''))).slice(0,7);if(!fu.length){toast('Nessun evento futuro',true);return}const t=`*PROSSIMI IMPEGNI - Calenzano ${DATA.squadra.categoria}*\n\n${fu.map(e=>`${fmtDate(e.data)} ${e.ora||''} - ${evL(e)}${e.avversario?' vs '+e.avversario:''}${e.luogo?'\n   '+e.luogo:''}`).join('\n\n')}\n\nMister Roberto`;shareWAGruppo(t)}
function shareGiocatoreWA(gId){const g=fG(gId);if(!g)return;const s=stats(gId),a=attendance(gId,isA),pp=attendance(gId,isP);const t=`*SCHEDA ${fn(g).toUpperCase()}*\n${g.ruolo} - n. ${g.numero||'-'}\nNato il ${fmtDate(g.dataNascita)} (${age(g.dataNascita)} anni)\nPiede: ${g.piede||'-'}\n\n*Statistiche stagione:*\nPresenze partite: ${s.presenze} (${pp.pct}%)\nMinuti: ${s.minuti}\nGol: ${s.gol} - Assist: ${s.assist}\nTiri: ${s.tiri} (${s.tiriDx} dx / ${s.tiriSx} sx / ${s.tiriTesta} testa)\nCartellini: ${s.gialli}G ${s.rossi}R\nPresenze allenamenti: ${a.pct}%\n\nMister Roberto`;shareWAGruppo(t)}
function shareRosaWA(){const gi=DATA.giocatori.slice().sort((a,b)=>(a.numero||99)-(b.numero||99));const t=`*ROSA Calenzano ${DATA.squadra.categoria} ${DATA.squadra.stagione}*\n\n${gi.map(g=>`${g.numero||'-'} ${fn(g)} (${g.ruolo})`).join('\n')}\n\nMister Roberto`;shareWAGruppo(t)}
function shareTatticaWA(){const positions=MODULI[_tatModulo];const lines=positions.map((p,i)=>{const g=fG(_tatAss[i]);return `${RUOLI[p.r]?.label||p.r}: ${g?fn(g):'(vuoto)'}${g?.numero?' n.'+g.numero:''}`});const t=`*FORMAZIONE ${_tatModulo} - Calenzano ${DATA.squadra.categoria}*\n\n${lines.join('\n')}${DATA.squadra.noteTattiche?'\n\n*Note tattiche:*\n'+DATA.squadra.noteTattiche:''}\n\nMister Roberto`;shareWAGruppo(t)}
function shareEsercizioWA(id){const e=DATA.esercizi.find(x=>x.id===id);if(!e)return;const t=`*ESERCIZIO: ${e.titolo}*\n${e.categoria?'Categoria: '+e.categoria+'\n':''}${e.durata?'Durata: '+e.durata+'\n':''}${e.giocatori?'Giocatori: '+e.giocatori+'\n':''}${e.obiettivo?'\n*Obiettivo:* '+e.obiettivo+'\n':''}${e.descrizione?'\n*Svolgimento:*\n'+e.descrizione+'\n':''}${e.materiale?'\n*Materiale:* '+e.materiale:''}\n\nMister Roberto`;shareWAGruppo(t)}
function shareValutazioneWA(gId){const g=fG(gId);if(!g)return;const v=DATA.valutazioni.filter(x=>x.giocatoreId===gId).sort((a,b)=>(b.data||'').localeCompare(a.data||''))[0];if(!v){toast('Nessuna valutazione',true);return}const media=((parseFloat(v.tecnica||0)+parseFloat(v.tattica||0)+parseFloat(v.fisica||0)+parseFloat(v.mentale||0)+parseFloat(v.comportamento||0))/5).toFixed(1);const t=`*VALUTAZIONE - ${fn(g)}*\n${v.periodo?v.periodo+' - ':''}${fmtDate(v.data)}\n\nTecnica: ${v.tecnica||'-'}/10\nTattica: ${v.tattica||'-'}/10\nFisica: ${v.fisica||'-'}/10\nMentale: ${v.mentale||'-'}/10\nComportamento: ${v.comportamento||'-'}/10\n\n*MEDIA: ${media}/10*${v.note?'\n\nNote: '+v.note:''}\n\nMister Roberto`;shareWAGruppo(t)}
function shareScadenzaWA(){const oggi=new Date();const sc=[];DATA.giocatori.forEach(g=>{if(g.certScadenza){const d=new Date(g.certScadenza);const diff=Math.ceil((d-oggi)/86400000);if(diff<=30)sc.push({tipo:'Cert. medico',g,data:g.certScadenza,diff})}});sc.sort((a,b)=>a.diff-b.diff);if(!sc.length){toast('Nessuna scadenza imminente',true);return}const t=`*SCADENZE CERTIFICATI*\n\n${sc.map(s=>`${fn(s.g)}: ${fmtDate(s.data)} (${s.diff<0?'SCADUTO':s.diff+' gg'})`).join('\n')}\n\nVi ricordo di rinnovare. Mister Roberto`;shareWAGruppo(t)}
function shareAttendanceWA(eId){const ev=fE(eId);const pres=DATA.presenze[ev.id]||{};const presKeys=Object.keys(pres);if(presKeys.length===0){if(!confirm('Nessuna presenza registrata per '+evL(ev)+' del '+fmtDate(ev.data)+'. Vuoi condividere ugualmente la lista vuota?'))return}const labels={P:'Presente',A:'Assente',I:'Infortunato',R:'Ritardo',S:'Squalificato'};const giocs=DATA.giocatori.slice().sort((a,b)=>(a.numero||99)-(b.numero||99));const lines=giocs.map(g=>{const st=pres[g.id];return `${g.numero||'-'} ${fn(g)}: ${labels[st]||'-'}`});const presentiCount=Object.values(pres).filter(s=>s==='P'||s==='R').length;const t=`*PRESENZE - ${evL(ev).toUpperCase()}*\n${fmtDateLong(ev.data)} ${ev.ora||''}\n${ev.luogo?'Luogo: '+ev.luogo+'\n':''}\nPresenti: ${presentiCount}/${giocs.length}\n\n${lines.join('\n')}\n\nMister Roberto`;shareWAGruppo(t)}
function showPresFor(eId){closeModal();_presFilter=isA(fE(eId))?'allenamento':'partita';showView('presenze')}

// ============ PARTITE ============
function render_partite(){const partite=DATA.eventi.filter(isP).sort((a,b)=>(b.data+(b.ora||'')).localeCompare(a.data+(a.ora||'')));document.getElementById('view-partite').innerHTML=`<div class="toolbar no-print"><div style="flex:1"></div><button class="btn btn-primary" onclick="openEventoModal()">+ Partita</button></div>
${partite.length===0?'<div class="empty-state">Nessuna partita</div>':`<div class="card" style="padding:0;overflow:auto"><table><thead><tr><th>Data</th><th>Tipo</th><th>Casa</th><th>Risultato</th><th>Trasferta</th><th>Marcatori</th><th></th></tr></thead><tbody>${partite.map(p=>{const isCasa=p.casaTrasferta==='casa';const home=isCasa?'<strong>Calenzano</strong>':esc(p.avversario||'');const away=isCasa?esc(p.avversario||''):'<strong>Calenzano</strong>';const gol=(p.eventiPartita||[]).filter(ev=>ev.tipo==='gol').map(ev=>{const g=fG(ev.giocatoreId);return g?pLink(g):''}).filter(Boolean).join(', ');return `<tr><td onclick="openEventoModal('${p.id}')" style="cursor:pointer">${fmtDate(p.data)}<br><span style="font-size:11px;color:var(--muted)">${p.ora||''}</span></td><td><span class="badge ${p.tipo==='partita'?'badge-att':'badge-warn'}">${evL(p)}</span></td><td>${home}</td><td style="text-align:center;font-weight:700;font-size:16px">${p.golCasa||0} - ${p.golTrasferta||0}</td><td>${away}</td><td style="font-size:11px">${gol||'-'}</td><td><button class="btn btn-secondary btn-sm" onclick="openPartitaDettagli('${p.id}')">Dettagli</button></td></tr>`}).join('')}</tbody></table></div>`}`}

function openPartitaDettagli(id){const e=fE(id);if(!e)return;
const formazione=e.formazione||[],panchina=e.panchina||[],sostituzioni=e.sostituzioni||[],eventi=e.eventiPartita||[];const dispo=DATA.giocatori.filter(g=>!formazione.includes(g.id)&&!panchina.includes(g.id));
// Build chronological timeline
const tl=[];eventi.forEach(ev=>tl.push({min:ev.minuto||0,tipo:ev.tipo,gioc:ev.giocatoreId,kind:'ev'}));sostituzioni.forEach(s=>tl.push({min:s.minuto||0,gIn:s.in,gOut:s.out,kind:'sub'}));tl.sort((a,b)=>a.min-b.min);
const tlHtml=tl.length?tl.map(x=>{if(x.kind==='sub'){const gI=fG(x.gIn),gO=fG(x.gOut);return `<div class="timeline-ev sub"><div class="minute">${x.min}'</div><div><strong>Sostituzione</strong><br><span style="color:var(--r2)">OUT: ${gO?pLink(gO):'-'}</span> &nbsp; <span style="color:var(--ok)">IN: ${gI?pLink(gI):'-'}</span></div></div>`}else{const g=fG(x.gioc);const labels={gol:'GOL',assist:'Assist',giallo:'Cartellino Giallo',rosso:'Cartellino Rosso',autogol:'Autogol',rigore:'Rigore segnato',rigoreSbagliato:'Rigore sbagliato',tiroDx:'Tiro destro',tiroSx:'Tiro sinistro',tiroTesta:'Tiro di testa'};const cls=x.tipo==='gol'?'gol':x.tipo==='giallo'?'giallo':x.tipo==='rosso'||x.tipo==='autogol'?'rosso':'';return `<div class="timeline-ev ${cls}"><div class="minute">${x.min}'</div><div><strong>${labels[x.tipo]||x.tipo}</strong><br>${g?pLink(g):'-'}</div></div>`}}).join(''):'<div class="empty-state">Nessun evento registrato per questa partita</div>';

const body=`<div class="tabs"><div class="tab active" onclick="switchTab(this,'tab-form')">Formazione</div><div class="tab" onclick="switchTab(this,'tab-eventi')">Eventi</div><div class="tab" onclick="switchTab(this,'tab-sub')">Sostituzioni</div><div class="tab" onclick="switchTab(this,'tab-info')">Info Partita</div></div>
<div id="tab-form" class="tab-pane">
<div class="form-group"><label class="form-label">Modulo</label><select class="form-select" id="mod-sel" onchange="updMod('${id}')">${Object.keys(MODULI).map(m=>`<option value="${m}" ${e.modulo===m?'selected':''}>${m}</option>`).join('')}</select></div>
<h4 style="color:var(--b1);margin-bottom:10px">Titolari (${formazione.length}/11)</h4>
${formazione.map(gId=>{const g=fG(gId);return g?`<div class="convoca-row"><span class="badge ${rBadge(g.ruolo)}">${g.numero||'-'}</span><span class="name">${pLink(g)}</span><span class="ruolo">${g.ruolo}</span><button class="btn btn-sm btn-secondary" onclick="rmTit('${id}','${gId}')">X</button></div>`:''}).join('')}
<select class="form-select" style="margin-top:10px" onchange="addTit('${id}',this.value);this.value=''"><option value="">+ Aggiungi titolare...</option>${dispo.map(g=>`<option value="${g.id}">${g.numero||'-'} ${esc(fn(g))} (${g.ruolo})</option>`).join('')}</select>
<h4 style="color:var(--b1);margin:16px 0 10px">Panchina (${panchina.length})</h4>
${panchina.map(gId=>{const g=fG(gId);return g?`<div class="convoca-row"><span class="badge ${rBadge(g.ruolo)}">${g.numero||'-'}</span><span class="name">${pLink(g)}</span><span class="ruolo">${g.ruolo}</span><button class="btn btn-sm btn-secondary" onclick="rmPan('${id}','${gId}')">X</button></div>`:''}).join('')}
<select class="form-select" style="margin-top:10px" onchange="addPan('${id}',this.value);this.value=''"><option value="">+ Aggiungi a panchina...</option>${dispo.map(g=>`<option value="${g.id}">${g.numero||'-'} ${esc(fn(g))} (${g.ruolo})</option>`).join('')}</select>
</div>
<div id="tab-eventi" class="tab-pane" style="display:none">
${eventi.length?eventi.sort((a,b)=>(a.minuto||0)-(b.minuto||0)).map((ev,i)=>{const g=fG(ev.giocatoreId);const tipi={gol:'Gol',assist:'Assist',giallo:'Giallo',rosso:'Rosso',autogol:'Autogol',rigore:'Rigore',rigoreSbagliato:'Rig. Sbagl.',tiroDx:'Tiro destro',tiroSx:'Tiro sinistro',tiroTesta:'Tiro di testa'};const c={gol:'badge-ok',assist:'badge-info',giallo:'badge-warn',rosso:'badge-danger',autogol:'badge-danger'}[ev.tipo]||'badge-muted';return `<div class="convoca-row"><span style="font-weight:700;min-width:40px">${ev.minuto||'-'}'</span><span class="badge ${c}">${tipi[ev.tipo]||ev.tipo}</span><span class="name">${g?pLink(g):'-'}</span><button class="btn btn-sm btn-danger" onclick="rmEvP('${id}',${i})">X</button></div>`}).join(''):'<div class="empty-state">Nessun evento</div>'}
<div style="margin-top:14px;padding:14px;background:var(--b4);border-radius:8px"><h5 style="margin-bottom:10px">+ Aggiungi evento</h5><div class="form-row-4"><select class="form-select" id="ev-tipo"><option value="gol">Gol</option><option value="assist">Assist</option><option value="giallo">Giallo</option><option value="rosso">Rosso</option><option value="autogol">Autogol</option><option value="rigore">Rigore</option><option value="rigoreSbagliato">Rig.Sbagl.</option><option value="tiroDx">Tiro destro</option><option value="tiroSx">Tiro sinistro</option><option value="tiroTesta">Tiro di testa</option></select><select class="form-select" id="ev-gioc">${[...formazione,...panchina].map(gId=>{const g=fG(gId);return g?`<option value="${g.id}">${esc(fn(g))}</option>`:''}).join('')}</select><input type="number" class="form-input" id="ev-min" placeholder="Minuto" min="1" max="90"><button class="btn btn-primary btn-sm" onclick="addEvP('${id}')">+</button></div></div>
</div>
<div id="tab-sub" class="tab-pane" style="display:none">
${sostituzioni.map((s,i)=>{const gI=fG(s.in),gO=fG(s.out);return `<div class="convoca-row"><span style="font-weight:700;min-width:40px">${s.minuto||'-'}'</span><span style="color:var(--r2)">OUT: ${gO?pLink(gO):'-'}</span><span style="color:var(--ok)">IN: ${gI?pLink(gI):'-'}</span><button class="btn btn-sm btn-danger" onclick="rmSub('${id}',${i})">X</button></div>`}).join('')}
<div style="margin-top:14px;padding:14px;background:var(--b4);border-radius:8px"><h5 style="margin-bottom:10px">+ Aggiungi sostituzione (max 7)</h5><div class="form-row-4"><select class="form-select" id="sub-out"><option value="">Esce...</option>${formazione.map(gId=>{const g=fG(gId);return g?`<option value="${g.id}">${esc(fn(g))}</option>`:''}).join('')}</select><select class="form-select" id="sub-in"><option value="">Entra...</option>${panchina.map(gId=>{const g=fG(gId);return g?`<option value="${g.id}">${esc(fn(g))}</option>`:''}).join('')}</select><input type="number" class="form-input" id="sub-min" placeholder="Min" min="1" max="90"><button class="btn btn-primary btn-sm" onclick="addSub('${id}')">+</button></div></div>
</div>
<div id="tab-info" class="tab-pane" style="display:none">
<div style="background:var(--b4);padding:14px;border-radius:8px;margin-bottom:14px">
<p><strong>Data:</strong> ${fmtDateLong(e.data)} - <strong>Ora:</strong> ${e.ora||'-'}</p>
<p><strong>Luogo:</strong> ${esc(e.luogo||'-')}</p>
<p><strong>Avversario:</strong> ${esc(e.avversario||'-')} (${e.casaTrasferta||'-'})</p>
<p><strong>Competizione:</strong> ${esc(e.competizione||'-')}</p>
<p style="font-size:20px;margin-top:8px"><strong>Risultato: ${e.golCasa||0} - ${e.golTrasferta||0}</strong></p>
</div>
<h4 style="color:var(--b1);margin-bottom:12px">Cronologia partita (minuto per minuto)</h4>
<div>${tlHtml}</div>
<div style="margin-top:14px;display:flex;gap:6px"><button class="btn btn-secondary btn-sm" onclick="openEventoModal('${id}')">Modifica info</button><button class="btn btn-wa btn-sm" onclick="shareEventoWA('${id}')">Condividi WA</button></div>
</div>`;
openModal('Dettagli Partita - '+fmtDate(e.data),body,'<button class="btn btn-primary" onclick="closeModal()">Chiudi</button>',{large:true})}
function updMod(id){fE(id).modulo=document.getElementById('mod-sel').value;saveData();toast('Modulo aggiornato')}
function addTit(id,gId){if(!gId)return;const e=fE(id);if(!e.formazione)e.formazione=[];if(e.formazione.length>=11){toast('Max 11 titolari',true);return}e.formazione.push(gId);saveData();openPartitaDettagli(id)}
function rmTit(id,gId){const e=fE(id);e.formazione=(e.formazione||[]).filter(x=>x!==gId);saveData();openPartitaDettagli(id)}
function addPan(id,gId){if(!gId)return;const e=fE(id);if(!e.panchina)e.panchina=[];e.panchina.push(gId);saveData();openPartitaDettagli(id)}
function rmPan(id,gId){const e=fE(id);e.panchina=(e.panchina||[]).filter(x=>x!==gId);saveData();openPartitaDettagli(id)}
function addEvP(id){const e=fE(id);if(!e.eventiPartita)e.eventiPartita=[];const t=document.getElementById('ev-tipo').value,gi=document.getElementById('ev-gioc').value,m=parseInt(document.getElementById('ev-min').value)||0;if(!gi){toast('Seleziona giocatore',true);return}e.eventiPartita.push({tipo:t,giocatoreId:gi,minuto:m});saveData();openPartitaDettagli(id)}
function rmEvP(id,i){const e=fE(id);e.eventiPartita.splice(i,1);saveData();openPartitaDettagli(id)}
function addSub(id){const e=fE(id);if(!e.sostituzioni)e.sostituzioni=[];if(e.sostituzioni.length>=7){toast('Max 7 sostituzioni',true);return}const o=document.getElementById('sub-out').value,i=document.getElementById('sub-in').value,m=parseInt(document.getElementById('sub-min').value)||0;if(!o||!i){toast('Seleziona entrambi',true);return}e.sostituzioni.push({out:o,in:i,minuto:m});saveData();openPartitaDettagli(id)}
function rmSub(id,i){const e=fE(id);e.sostituzioni.splice(i,1);saveData();openPartitaDettagli(id)}

// ============ CONVOCAZIONI ============
function render_convocazioni(){const partite=DATA.eventi.filter(isP).sort((a,b)=>(a.data+(a.ora||'')).localeCompare(b.data+(b.ora||'')));const future=partite.filter(p=>new Date(p.data)>=new Date(new Date().toDateString()));
document.getElementById('view-convocazioni').innerHTML=`<div class="alert alert-info no-print">Crea il foglio convocazione stampabile. Seleziona i 20 convocati e premi "Stampa Foglio" per ottenere il PDF ufficiale con logo, orario e luogo.</div>
<div class="card" style="margin-bottom:16px"><div class="card-header"><div class="card-title">Prossime Partite</div></div>
${future.length===0?'<div class="empty-state">Nessuna partita prossima</div>':future.map(p=>`<div class="list-item"><div><strong>${fmtDateLong(p.data)}</strong> ${p.ora||''}<br><span style="font-size:12px;color:var(--muted)">vs ${esc(p.avversario||'-')} - ${p.casaTrasferta==='trasferta'?'TRASFERTA':'CASA'} - ${esc(p.luogo||'')}</span></div><button class="btn btn-primary btn-sm" onclick="openConvocazione('${p.id}')">Convocazione</button></div>`).join('')}</div>

ne</div>'}</div>`}).join('')}</div>`}

// ============ SCADENZE ============
function render_scadenze(){const oggi=new Date();const sc=[];
DATA.giocatori.forEach(g=>{
  if(g.certScadenza){const d=new Date(g.certScadenza);const diff=Math.ceil((d-oggi)/86400000);sc.push({tipo:'Certificato medico',g,data:g.certScadenza,diff,grav:diff<0?'danger':diff<30?'warn':'ok'})}
  if(g.tessScadenza){const d=new Date(g.tessScadenza);const diff=Math.ceil((d-oggi)/86400000);sc.push({tipo:'Tesseramento',g,data:g.tessScadenza,diff,grav:diff<0?'danger':diff<60?'warn':'ok'})}
  if(g.dataNascita){const cm=new Date(g.dataNascita);cm.setFullYear(oggi.getFullYear());if(cm<oggi)cm.setFullYear(oggi.getFullYear()+1);const diff=Math.ceil((cm-oggi)/86400000);if(diff<60)sc.push({tipo:'Compleanno',g,data:cm.toISOString().slice(0,10),diff,grav:'info',isBday:true})}
});
DATA.scadenze.forEach(s=>{if(!s.completata){const d=new Date(s.data);const diff=Math.ceil((d-oggi)/86400000);sc.push({tipo:s.tipo||'Promemoria',custom:s,data:s.data,diff,desc:s.descrizione,grav:diff<0?'danger':diff<14?'warn':'ok'})}});
sc.sort((a,b)=>a.diff-b.diff);
document.getElementById('view-scadenze').innerHTML=`<div class="toolbar no-print"><button class="btn btn-wa btn-sm" onclick="shareScadenzaWA()">Condividi Scadenze WA</button><div style="flex:1"></div><button class="btn btn-primary" onclick="openScadModal()">+ Nuova Scadenza</button></div>
<div class="alert alert-info no-print">Le scadenze critiche (1-2 giorni) e i compleanni ti vengono mostrati come popup all'apertura dell'app.</div>
<div class="card"><div class="card-header"><div class="card-title">Scadenze in arrivo</div></div>
<table><thead><tr><th>Tipo</th><th>Riferimento</th><th>Data</th><th>Giorni</th><th>Stato</th><th></th></tr></thead><tbody>${sc.length===0?'<tr><td colspan="6" class="empty-state">Nessuna scadenza</td></tr>':sc.map(s=>{const stato=s.diff<0?'<span class="badge badge-danger">SCADUTA</span>':s.diff===0?'<span class="badge badge-warn">OGGI</span>':s.diff===1?'<span class="badge badge-warn">DOMANI</span>':s.diff<14?'<span class="badge badge-warn">'+s.diff+'g</span>':'<span class="badge badge-ok">'+s.diff+'g</span>';return `<tr><td><span class="badge badge-${s.grav}">${s.tipo}</span></td><td>${s.g?pLink(s.g):esc(s.desc||'')}</td><td>${fmtDate(s.data)}</td><td><strong>${s.diff<0?'scaduto':s.diff+' gg'}</strong></td><td>${stato}</td><td>${s.g&&!s.custom?`<button class="btn btn-sm btn-secondary" onclick="openGiocatoreModal('${s.g.id}')">Apri</button>`:s.custom?`<button class="btn btn-sm btn-secondary" onclick="openScadModal('${s.custom.id}')">Mod.</button>`:''} ${s.isBday&&s.g&&s.g.genitore1Telefono?`<button class="btn btn-sm btn-wa" onclick="waPhone('${s.g.genitore1Telefono}','Tanti auguri a ${esc(s.g.nome)}! Buon compleanno da Mister Roberto e tutta la squadra Calenzano 2013!')">Auguri WA</button>`:''}</td></tr>`}).join('')}</tbody></table></div>`}
function openScadModal(id){const s=id?DATA.scadenze.find(x=>x.id===id):null;const body=`<form id="fs" onsubmit="event.preventDefault();sScad('${id||''}')"><div class="form-row"><div class="form-group"><label class="form-label">Tipo</label><input class="form-input" name="tipo" value="${esc(s?.tipo||'Promemoria')}" required></div><div class="form-group"><label class="form-label">Data*</label><input type="date" class="form-input" name="data" value="${s?.data||''}" required></div></div><div class="form-group"><label class="form-label">Descrizione</label><textarea class="form-textarea" name="descrizione">${esc(s?.descrizione||'')}</textarea></div><div class="form-group"><label class="form-label">Giocatore</label><select class="form-select" name="giocatoreId"><option value="">-</option>${DATA.giocatori.map(g=>`<option value="${g.id}" ${s?.giocatoreId===g.id?'selected':''}>${esc(fn(g))}</option>`).join('')}</select></div><div class="form-group"><label class="checkbox"><input type="checkbox" name="completata" ${s?.completata?'checked':''}> Completata</label></div></form>`;const f=`${s?`<button class="btn btn-danger" onclick="DATA.scadenze=DATA.scadenze.filter(x=>x.id!=='${s.id}');saveData();closeModal();render_scadenze()">Elimina</button>`:''}<button class="btn btn-secondary" onclick="resetForm('fs')">Reset</button><button class="btn btn-secondary" onclick="closeModal()">Annulla</button><button class="btn btn-primary" onclick="document.getElementById('fs').requestSubmit()">Salva</button>`;openModal(s?'Modifica':'Nuova Scadenza',body,f)}
function sScad(id){const f=document.getElementById('fs'),o={};Array.from(f.elements).forEach(el=>{if(!el.name)return;if(el.type==='checkbox')o[el.name]=el.checked;else o[el.name]=el.value});if(id){Object.assign(DATA.scadenze.find(x=>x.id===id),o)}else{o.id=uid();DATA.scadenze.push(o)}saveData();closeModal();render_scadenze();toast('Salvato')}

// ============ REMINDER POPUP ============
function checkReminders(){const oggi=new Date();const oggiISO=todayISO();const dismissed=JSON.parse(localStorage.getItem(REMINDER_DISMISS_KEY)||'{}');
const items=[];
DATA.giocatori.forEach(g=>{
  // Birthdays in 1-2 days
  if(g.dataNascita){const cm=new Date(g.dataNascita);cm.setFullYear(oggi.getFullYear());if(cm<oggi)cm.setFullYear(oggi.getFullYear()+1);const diff=Math.ceil((cm-oggi)/86400000);if(diff>=0&&diff<=2){const k='bday_'+g.id+'_'+cm.getFullYear();if(dismissed[k]!==oggiISO)items.push({k,kind:'bday',g,diff})}}
  // Cert/tess scadenze
  if(g.certScadenza){const d=new Date(g.certScadenza);const diff=Math.ceil((d-oggi)/86400000);if(diff>=0&&diff<=2){const k='cert_'+g.id;if(dismissed[k]!==oggiISO)items.push({k,kind:'cert',g,diff})}}
});
DATA.scadenze.forEach(s=>{if(s.completata)return;const d=new Date(s.data);const diff=Math.ceil((d-oggi)/86400000);if(diff>=0&&diff<=2){const k='scad_'+s.id;if(dismissed[k]!==oggiISO)items.push({k,kind:'scad',s,diff})}});
items.slice(0,3).forEach((it,i)=>setTimeout(()=>showReminder(it),i*200))}

function showReminder(it){const r=document.createElement('div');r.className='reminder-pop'+(it.kind==='bday'?' bday':'');r.style.top=(24+document.querySelectorAll('.reminder-pop').length*120)+'px';
let html='';
if(it.kind==='bday'){const dayLbl=it.diff===0?'OGGI':it.diff===1?'DOMANI':'tra 2 giorni';html=`<h4>Compleanno ${dayLbl}!</h4><p><strong>${esc(fn(it.g))}</strong> compie gli anni ${it.diff===0?'oggi':dayLbl}. Non dimenticare gli auguri!</p><div class="actions">${it.g.genitore1Telefono?`<button class="btn btn-wa btn-sm" onclick="waPhone('${it.g.genitore1Telefono}','Tanti auguri a ${esc(it.g.nome)}! Buon compleanno da Mister Roberto e tutta la squadra Calenzano 2013!');dismissReminder('${it.k}',this)">Auguri WA</button>`:''}<button class="btn btn-secondary btn-sm" onclick="openGiocatoreModal('${it.g.id}')">Scheda</button><button class="btn btn-secondary btn-sm" onclick="dismissReminder('${it.k}',this)">OK ho visto</button></div>`}
else if(it.kind==='cert'){const dl=it.diff===0?'OGGI':it.diff===1?'DOMANI':'tra 2 gg';html=`<h4>Certificato medico ${dl}</h4><p><strong>${esc(fn(it.g))}</strong>: scadenza certificato medico ${dl}.</p><div class="actions"><button class="btn btn-secondary btn-sm" onclick="openGiocatoreModal('${it.g.id}')">Apri scheda</button><button class="btn btn-secondary btn-sm" onclick="dismissReminder('${it.k}',this)">OK</button></div>`}
else if(it.kind==='scad'){const dl=it.diff===0?'OGGI':it.diff===1?'DOMANI':'tra 2 gg';html=`<h4>Promemoria ${dl}</h4><p><strong>${esc(it.s.tipo||'Scadenza')}:</strong> ${esc(it.s.descrizione||'')}</p><div class="actions"><button class="btn btn-secondary btn-sm" onclick="dismissReminder('${it.k}',this)">OK</button></div>`}
r.innerHTML=html;document.getElementById('reminder-root').appendChild(r)}
function dismissReminder(k,btn){const d=JSON.parse(localStorage.getItem(REMINDER_DISMISS_KEY)||'{}');d[k]=todayISO();localStorage.setItem(REMINDER_DISMISS_KEY,JSON.stringify(d));btn.closest('.reminder-pop').remove();
// re-stack
document.querySelectorAll('.reminder-pop').forEach((el,i)=>el.style.top=(24+i*120)+'px')}

<div class="card" style="margin-top:16px"><div class="card-header"><div class="card-title">Comunicazioni Salvate</div></div>${DATA.comunicazioni.length===0?'<div class="empty-state">Nessuna</div>':DATA.comunicazioni.sort((a,b)=>(b.data||'').localeCompare(a.data||'')).map(c=>`<div class="list-item" onclick="openComModal('${c.id}')"><div><strong>${esc(c.oggetto||'')}</strong><br><span style="font-size:11px;color:var(--muted)">${fmtDate(c.data)}</span></div><span class="badge badge-info">${esc(c.tipo||'')}</span></div>`).join('')}</div>`}
